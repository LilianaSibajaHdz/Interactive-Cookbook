<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REDECOIN</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="img/ico.png" type="image/png">
</head>
<body class="bg-light">

    <div class="container py-5">
        <h1 class="text-center mb-4">
            <i class="fas fa-utensils"></i> Recetario de cocina Interactivo
        </h1>
        <!-- Buscador -->
        <div class="row mb-4 justify-content-center">
            <div class="col-md-6">
                <input type="text" id="buscador" class="form-control" placeholder="Buscar por nombre o categoría...">
            </div>
        </div>

        <div class="row">
            <!-- Formulario para agregar recetas -->
            <div class="col-lg-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Nueva Receta</h5>
                        <form id="formularioReceta">
                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" id="nombre" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Categoría</label>
                                <select id="categoria" class="form-select">
                                    <option value="Plato fuerte">Plato fuerte</option>
                                    <option value="Postre">Postre</option>
                                    <option value="Entrada">Entrada</option>
                                    <option value="Bebida">Bebida</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Ingredientes (separados por comas)</label>
                                <textarea id="ingredientes" class="form-control" rows="2" required></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Pasos (separados por comas)</label>
                                <textarea id="pasos" class="form-control" rows="2" required></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">URL de la Imagen</label>
                                <input type="url" id="imagenUrl" class="form-control" placeholder="https://ejemplo.com/imagen.jpg" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Guardar Receta</button>
                        </form>
                    </div>
                </div>
            </div>
           <!--Mostrador de las recetas--> 
            <div class="col-lg-8">
                <div id="contenedorRecetas" class="row row-cols-1 row-cols-md-2 g-4">
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
